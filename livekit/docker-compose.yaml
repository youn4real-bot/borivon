name: borivon-livekit

# Self-hosted, open-source LiveKit (Apache-2.0). No account, no third party —
# your VPS, your keys. Two containers: the LiveKit media server + Caddy, which
# auto-provisions a free HTTPS certificate so browsers can connect over wss://.
# Both run on the host network so WebRTC media ports work without mapping.

services:
  livekit:
    image: livekit/livekit-server:latest
    command: --config /etc/livekit.yaml
    restart: unless-stopped
    network_mode: host
    env_file: .env            # LIVEKIT_KEYS lives here (generated by setup.sh, never committed)
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml:ro

  caddy:
    image: caddy:2
    restart: unless-stopped
    network_mode: host        # binds :80 + :443 on the host for auto-HTTPS
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./caddy_data:/data
      - ./caddy_config:/config

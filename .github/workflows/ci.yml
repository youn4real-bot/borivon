name: CI

# Gate every push / PR on type-checking + the test suite so a broken commit
# can never reach a deploy. Fast + env-independent (no build, no secrets):
# tsc proves the whole tree compiles, vitest covers the security-critical
# invariants (auth, passport gate, download-token, R2 path-safety, CV sanitize).
on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - name: Type-check
        run: npx tsc --noEmit
      - name: Tests
        run: npm test
